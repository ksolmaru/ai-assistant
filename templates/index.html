<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 캘린더</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary":                  "#655882",
            "primary-dim":              "#594c76",
            "primary-fixed":            "#dacafb",
            "primary-fixed-dim":        "#ccbcec",
            "on-primary":               "#fdf7ff",
            "on-primary-fixed":         "#3a2e55",
            "primary-container":        "#dacafb",
            "on-primary-container":     "#4d4169",
            "secondary":                "#3b675b",
            "secondary-fixed":          "#bceddd",
            "on-secondary-fixed":       "#18473b",
            "secondary-container":      "#bceddd",
            "on-secondary-container":   "#2d5a4e",
            "tertiary-fixed-dim":       "#f0d8c8",
            "on-tertiary-fixed":        "#514136",
            "surface":                  "#f9f9fc",
            "surface-container-lowest": "#ffffff",
            "surface-container-low":    "#f2f3f7",
            "surface-container":        "#eceef3",
            "surface-container-high":   "#e6e8ed",
            "on-surface":               "#2e3338",
            "on-surface-variant":       "#5b5f65",
            "outline-variant":          "#aeb2b8",
            "error":                    "#a8364b",
            "background":               "#f9f9fc",
          },
          fontFamily: { "headline": ['"Noto Sans KR"', "sans-serif"] }
        }
      }
    }
  </script>
  <style>
    *{font-family:'Inter','Noto Sans KR',sans-serif;}
    h1,h2,h3,.hl{font-family:'Noto Sans KR',sans-serif;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;line-height:1;}
    .fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
    /* 타이핑 */
    .dot{width:7px;height:7px;border-radius:50%;background:#655882;animation:dot-flash 1s infinite linear alternate;}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes dot-flash{0%{opacity:.2}100%{opacity:1}}
    /* prose */
    .prose ul{list-style:disc;padding-left:1.25rem}.prose ol{list-style:decimal;padding-left:1.25rem}
    .prose strong{font-weight:700}.prose p{margin-bottom:.5rem}
    /* nav active */
    .nav-active{color:#655882 !important;background:rgba(218,202,251,0.35) !important;font-weight:700;}
    /* 달력 */
    .cal-day{min-height:80px;cursor:pointer;transition:background .12s;}
    .cal-day:hover{background:#f2f3f7 !important;}
    /* 스크롤 */
    .cscroll::-webkit-scrollbar{width:4px;}
    .cscroll::-webkit-scrollbar-track{background:transparent;}
    .cscroll::-webkit-scrollbar-thumb{background:#dfe3e9;border-radius:10px;}
    /* 스핀 */
    @keyframes spin{to{transform:rotate(360deg);}}
    .spin{animation:spin 1s linear infinite;display:inline-block;}
    /* 카테고리 컬러 선택 */
    .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;}
    .color-swatch:hover{transform:scale(1.15);}
    .color-swatch.selected{border-color:#655882;transform:scale(1.15);}
    /* AI halo */
    .ai-halo{position:fixed;top:0;right:0;width:500px;height:500px;background:#dacafb;opacity:.08;filter:blur(120px);border-radius:9999px;pointer-events:none;z-index:-1;}
    /* 탭 업데이트 뱃지 */
    @keyframes badge-pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
  </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden h-screen flex">
<div class="ai-halo"></div>

<!-- ══════════════════════════════════════════
     사이드바
══════════════════════════════════════════ -->
<aside class="w-[228px] flex-shrink-0 h-screen bg-surface-container-low flex flex-col p-5 gap-4 z-50">

  <!-- 로고 -->
  <div class="px-2 pt-1">
    <p class="text-lg hl font-bold text-primary leading-none">AI 캘린더</p>
  </div>

  <!-- 날짜 -->
  <div class="bg-primary-fixed/25 rounded-xl px-3 py-2.5">
    <p id="sidebar-date" class="text-xs font-bold text-primary leading-snug"></p>
  </div>

  <!-- 네비 -->
  <nav class="flex flex-col gap-0.5">
    <button onclick="switchTab('today')" id="tab-today"
      class="nav-active flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-on-surface/60 hover:bg-primary-fixed/20 transition-all text-sm text-left w-full">
      <span class="material-symbols-outlined text-[20px]">today</span><span>오늘</span>
    </button>
    <button onclick="switchTab('week')" id="tab-week"
      class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-on-surface/60 hover:bg-primary-fixed/20 transition-all text-sm text-left w-full">
      <span class="material-symbols-outlined text-[20px]">date_range</span><span>주간</span>
    </button>
    <button onclick="switchTab('month')" id="tab-month"
      class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-on-surface/60 hover:bg-primary-fixed/20 transition-all text-sm text-left w-full">
      <span class="material-symbols-outlined text-[20px]">calendar_month</span><span>월별</span>
    </button>
    <button onclick="switchTab('chat')" id="tab-chat"
      class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-on-surface/60 hover:bg-primary-fixed/20 transition-all text-sm text-left w-full">
      <span class="material-symbols-outlined text-[20px]">chat_bubble</span><span>AI 채팅</span>
    </button>
  </nav>

  <!-- 카테고리 (토글 + 관리) -->
  <div class="flex-1 overflow-hidden flex flex-col">
    <div class="flex items-center justify-between mb-2 px-1">
      <p class="text-[10px] font-bold text-on-surface-variant/50 uppercase tracking-widest">카테고리</p>
      <button onclick="openCatModal(null)" title="카테고리 추가"
        class="w-6 h-6 flex items-center justify-center rounded-lg hover:bg-primary-fixed/30 transition-colors">
        <span class="material-symbols-outlined text-[16px] text-primary">add</span>
      </button>
    </div>
    <!-- 카테고리 목록 (동적 렌더) -->
    <div id="cat-list" class="space-y-0.5 overflow-y-auto cscroll flex-1"></div>
  </div>

  <!-- 하단 -->
  <div class="border-t border-outline-variant/20 pt-3 space-y-0.5 flex-shrink-0">
    <button onclick="quickSend('뭐 놓친 거 있어?')"
      class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-error/70 hover:bg-error/5 transition-all text-sm w-full">
      <span class="material-symbols-outlined text-[20px]">warning</span><span>놓친 일 확인</span>
    </button>
    <button onclick="refreshAll()"
      class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-on-surface/40 hover:bg-surface-container transition-all text-sm w-full">
      <span class="material-symbols-outlined text-[20px]">refresh</span><span>새로고침</span>
    </button>
  </div>
</aside>

<!-- ══════════════════════════════════════════
     메인
══════════════════════════════════════════ -->
<div class="flex-1 flex flex-col overflow-hidden">

  <!-- 헤더 -->
  <header class="h-14 flex-shrink-0 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10
                 flex items-center justify-between px-6 z-40">
    <div class="flex items-center gap-4">
      <h1 id="header-title" class="hl font-bold text-lg text-on-surface">오늘</h1>
      <!-- 주간/월별 네비 -->
      <div id="nav-controls" class="hidden items-center gap-2">
        <button id="btn-prev" class="w-8 h-8 flex items-center justify-center rounded-lg bg-surface-container hover:bg-surface-container-high transition-colors">
          <span class="material-symbols-outlined text-[18px]">chevron_left</span>
        </button>
        <span id="nav-label" class="text-sm font-semibold text-on-surface min-w-[140px] text-center"></span>
        <button id="btn-next" class="w-8 h-8 flex items-center justify-center rounded-lg bg-surface-container hover:bg-surface-container-high transition-colors">
          <span class="material-symbols-outlined text-[18px]">chevron_right</span>
        </button>
        <!-- 오늘로 버튼 -->
        <button onclick="goToToday()" title="오늘 날짜로"
          class="px-3 h-8 flex items-center gap-1 rounded-lg bg-primary-fixed/40 text-primary
                 hover:bg-primary-fixed/60 transition-colors text-xs font-bold">
          <span class="material-symbols-outlined text-[15px]">my_location</span>오늘
        </button>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- 이미지 내보내기 (주간/월별에서만) -->
      <button id="export-btn" onclick="exportCalendar()" title="이미지로 저장"
        class="hidden items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold
               border border-outline-variant/30 text-on-surface-variant
               hover:bg-surface-container-high transition-all">
        <span class="material-symbols-outlined text-[16px]">download</span>
        <span>이미지 저장</span>
      </button>
      <!-- 일정 추가 -->
      <button onclick="openNewTask()"
        class="flex items-center gap-1.5 px-4 py-1.5 rounded-xl font-bold text-xs
               bg-gradient-to-br from-primary to-primary-dim text-on-primary
               shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
        <span class="material-symbols-outlined text-[16px]">add</span>일정 추가
      </button>
    </div>
  </header>

  <!-- 뷰 컨테이너 -->
  <div class="flex-1 overflow-hidden relative">

    <!-- 오늘 -->
    <div id="view-today" class="absolute inset-0 overflow-y-auto cscroll p-6">
      <div class="max-w-2xl mx-auto" id="today-content">
        <p class="text-on-surface-variant text-center mt-12 text-sm">로딩 중...</p>
      </div>
    </div>

    <!-- 주간 -->
    <div id="view-week" class="absolute inset-0 overflow-y-auto cscroll p-6 hidden">
      <div class="max-w-5xl mx-auto">
        <div id="week-overdue" class="hidden mb-4 bg-error/5 rounded-2xl p-4 border border-error/10">
          <h3 class="text-xs font-bold text-error mb-2 flex items-center gap-1">
            <span class="material-symbols-outlined text-[14px]">warning</span> 지난 할 일
          </h3>
          <div id="week-overdue-list" class="space-y-1.5"></div>
        </div>
        <div id="week-content"></div>
      </div>
    </div>

    <!-- 월별 -->
    <div id="view-month" class="absolute inset-0 overflow-y-auto cscroll p-6 hidden">
      <div class="max-w-4xl mx-auto">
        <div id="month-grid"></div>
        <div id="day-detail" class="hidden mt-4 bg-surface-container-lowest rounded-2xl p-5 border border-outline-variant/15 shadow-sm">
          <h3 id="day-detail-title" class="hl font-bold text-on-surface mb-3 text-sm"></h3>
          <div id="day-detail-list" class="space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- 채팅 -->
    <div id="view-chat" class="absolute inset-0 flex flex-col hidden">
      <div class="bg-primary-fixed/20 border-b border-primary-fixed/30 px-6 py-2 flex-shrink-0">
        <p class="text-xs text-primary font-medium flex items-center gap-1">
          <span class="material-symbols-outlined text-[14px]">tips_and_updates</span>
          자연어로 일정을 추가·수정·삭제하세요. 예: "내일 오전 10시 찬양팀 연습 있어"
        </p>
      </div>
      <div id="messages" class="flex-1 overflow-y-auto cscroll p-6 space-y-4"></div>
      <div class="bg-surface/90 backdrop-blur-md border-t border-outline-variant/10 p-4 flex-shrink-0">
        <div class="flex gap-2 mb-3 flex-wrap">
          <button onclick="quickSend('오늘 할 일 뭐야?')" class="text-xs px-3 py-1.5 bg-primary-fixed/40 text-on-primary-fixed rounded-full font-medium hover:bg-primary-fixed/60 transition-colors">오늘 일정</button>
          <button onclick="quickSend('이번 주 마감인 일 알려줘')" class="text-xs px-3 py-1.5 bg-secondary-fixed/40 text-on-secondary-fixed rounded-full font-medium hover:bg-secondary-fixed/60 transition-colors">이번 주</button>
          <button onclick="quickSend('완료된 일 빼고 전부 보여줘')" class="text-xs px-3 py-1.5 bg-surface-container text-on-surface-variant rounded-full font-medium hover:bg-surface-container-high transition-colors">전체 목록</button>
          <button onclick="quickSend('뭐 놓친 거 있어?')" class="text-xs px-3 py-1.5 bg-error/10 text-error rounded-full font-medium hover:bg-error/20 transition-colors">놓친 일</button>
          <button onclick="clearHistory()" class="text-xs px-3 py-1.5 bg-surface-container text-on-surface-variant/50 rounded-full font-medium hover:text-error hover:bg-error/5 transition-colors ml-auto">대화 초기화</button>
        </div>
        <div class="relative max-w-3xl mx-auto">
          <input id="input" type="text"
            placeholder="예: 다음 주 토요일 오후 2시 공연팀 리허설 있어"
            class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-2xl px-5 py-3 text-sm placeholder:text-on-surface-variant/40 pr-14 focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"/>
          <button id="send-btn" onclick="sendMessage()"
            class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br from-primary to-primary-dim text-on-primary shadow-lg hover:scale-105 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-[18px]" id="send-icon">send</span>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════
     일정 상세/편집 모달
══════════════════════════════════════════ -->
<div id="task-modal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-on-surface/20 backdrop-blur-sm" onclick="closeModal()"></div>
  <div class="absolute right-0 top-0 h-full w-[420px] bg-surface-container-lowest shadow-2xl flex flex-col border-l border-outline-variant/10">
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/10 flex-shrink-0">
      <h2 id="modal-title-label" class="hl font-bold text-on-surface text-base">일정 상세</h2>
      <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined text-[18px] text-on-surface-variant">close</span>
      </button>
    </div>
    <!-- 상태 선택 -->
    <div class="px-6 py-3 border-b border-outline-variant/10 flex-shrink-0">
      <p class="text-[10px] font-bold text-on-surface-variant/50 uppercase tracking-widest mb-2">상태</p>
      <div class="flex gap-2">
        <button onclick="setModalStatus('todo')" id="status-todo"
          class="flex-1 py-2 rounded-xl text-xs font-bold border-2 transition-all border-outline-variant/20 text-on-surface-variant hover:border-primary/40">
          <span class="material-symbols-outlined text-[14px]">radio_button_unchecked</span> 할 일
        </button>
        <button onclick="setModalStatus('in_progress')" id="status-in_progress"
          class="flex-1 py-2 rounded-xl text-xs font-bold border-2 transition-all border-outline-variant/20 text-on-surface-variant hover:border-secondary/40">
          <span class="material-symbols-outlined text-[14px]">timelapse</span> 진행 중
        </button>
        <button onclick="setModalStatus('done')" id="status-done"
          class="flex-1 py-2 rounded-xl text-xs font-bold border-2 transition-all border-outline-variant/20 text-on-surface-variant hover:border-secondary/40">
          <span class="material-symbols-outlined text-[14px]">check_circle</span> 완료
        </button>
      </div>
    </div>
    <!-- 폼 -->
    <div class="flex-1 overflow-y-auto cscroll px-6 py-5 space-y-4">
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">제목</label>
        <input id="modal-field-title" type="text"
          class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"/>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">날짜</label>
          <input id="modal-field-due_date" type="date"
            class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"/>
        </div>
        <div>
          <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">시간</label>
          <input id="modal-field-due_time" type="time"
            class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"/>
        </div>
      </div>
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">카테고리</label>
        <select id="modal-field-category"
          class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
          <option value="">— 선택 안 함 —</option>
        </select>
      </div>
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">장소</label>
        <input id="modal-field-location" type="text" placeholder="예: 본당, 2층 회의실"
          class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"/>
      </div>
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">인원</label>
        <input id="modal-field-attendees" type="text" placeholder="예: 5명 (홍길동, 김철수)"
          class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"/>
      </div>
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">메모</label>
        <textarea id="modal-field-description" rows="3" placeholder="추가 메모..."
          class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all resize-none"></textarea>
      </div>
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">우선순위</label>
        <select id="modal-field-priority"
          class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
          <option value="low">낮음</option>
          <option value="medium">보통</option>
          <option value="high">높음</option>
        </select>
      </div>
      <div id="modal-created-area" class="hidden">
        <p class="text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-widest mb-1">등록일</p>
        <p id="modal-created-at" class="text-xs text-on-surface-variant/60"></p>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-outline-variant/10 flex gap-3 flex-shrink-0">
      <button onclick="saveModal()"
        class="flex-1 py-2.5 rounded-xl font-bold text-sm bg-gradient-to-br from-primary to-primary-dim text-on-primary shadow-md hover:scale-[1.02] active:scale-[.98] transition-all">
        저장
      </button>
      <button onclick="deleteFromModal()" id="modal-delete-btn"
        class="hidden px-4 py-2.5 rounded-xl font-bold text-sm border-2 border-error/20 text-error hover:bg-error/5 transition-all">
        삭제
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     카테고리 편집 모달
══════════════════════════════════════════ -->
<div id="cat-modal" class="fixed inset-0 z-[110] hidden">
  <div class="absolute inset-0 bg-on-surface/20 backdrop-blur-sm" onclick="closeCatModal()"></div>
  <div class="absolute left-[228px] top-0 h-full w-[320px] bg-surface-container-lowest shadow-2xl flex flex-col border-r border-outline-variant/10">
    <div class="flex items-center justify-between px-5 py-4 border-b border-outline-variant/10 flex-shrink-0">
      <h2 id="cat-modal-title" class="hl font-bold text-on-surface text-base">카테고리 추가</h2>
      <button onclick="closeCatModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined text-[18px] text-on-surface-variant">close</span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto cscroll px-5 py-5 space-y-5">
      <!-- 이름 -->
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-1.5">카테고리 이름</label>
        <input id="cat-field-name" type="text" placeholder="예: 개인 공부"
          class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"/>
      </div>
      <!-- 색상 -->
      <div>
        <label class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest block mb-2">색상 선택</label>
        <div id="color-swatches" class="flex flex-wrap gap-2"></div>
        <!-- 미리보기 -->
        <div class="mt-3">
          <p class="text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-widest mb-1.5">미리보기</p>
          <span id="cat-preview" class="inline-block text-xs font-bold px-3 py-1 rounded-full">카테고리</span>
        </div>
      </div>
    </div>
    <div class="px-5 py-4 border-t border-outline-variant/10 flex gap-3 flex-shrink-0">
      <button onclick="saveCatModal()"
        class="flex-1 py-2.5 rounded-xl font-bold text-sm bg-gradient-to-br from-primary to-primary-dim text-on-primary shadow-md hover:scale-[1.02] transition-all">
        저장
      </button>
      <button onclick="deleteCatFromModal()" id="cat-delete-btn"
        class="hidden px-4 py-2.5 rounded-xl font-bold text-sm border-2 border-error/20 text-error hover:bg-error/5 transition-all">
        삭제
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     JavaScript
══════════════════════════════════════════ -->
<script>
// ── 카테고리 데이터 ────────────────────────────────────────────────
const DEFAULT_CATS = [
  {id:1, name:'교회/찬양부',    bg:'#ccbcec', text:'#3a2e55', visible:true},
  {id:2, name:'공연팀',         bg:'#bceddd', text:'#18473b', visible:true},
  {id:3, name:'부장님 보고/회의',bg:'#f0d8c8', text:'#514136', visible:true},
  {id:4, name:'개인 약속',      bg:'#e6e8ed', text:'#2e3338', visible:true},
];

// 색상 프리셋 (배경색, 텍스트색, 레이블)
const COLOR_PRESETS = [
  {bg:'#ccbcec', text:'#3a2e55', label:'보라'},
  {bg:'#bceddd', text:'#18473b', label:'청록'},
  {bg:'#f0d8c8', text:'#514136', label:'살구'},
  {bg:'#e6e8ed', text:'#2e3338', label:'회색'},
  {bg:'#fef3c7', text:'#92400e', label:'노랑'},
  {bg:'#bfdbfe', text:'#1e40af', label:'파랑'},
  {bg:'#fce7f3', text:'#9d174d', label:'분홍'},
  {bg:'#d1fae5', text:'#065f46', label:'초록'},
  {bg:'#fee2e2', text:'#991b1b', label:'빨강'},
  {bg:'#ede9fe', text:'#5b21b6', label:'인디고'},
];

let categories = [];
let catEditId  = null;   // null = 신규
let catColorIdx = 0;     // 현재 선택된 프리셋 인덱스

function loadCategories() {
  const saved = localStorage.getItem('ai-categories');
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return JSON.parse(JSON.stringify(DEFAULT_CATS));
}
function saveCategories() {
  localStorage.setItem('ai-categories', JSON.stringify(categories));
}

// ── 카테고리 사이드바 렌더 ─────────────────────────────────────────
function renderCatList() {
  if (!categories.length) {
    document.getElementById('cat-list').innerHTML =
      `<p class="text-xs text-on-surface-variant/40 px-1 py-2">카테고리 없음</p>`;
    return;
  }
  const html = categories.map(cat => `
    <div class="flex items-center gap-1.5 group py-0.5 px-1 rounded-lg hover:bg-primary-fixed/10 transition-colors">
      <!-- 토글 (눈 아이콘) -->
      <button onclick="toggleCatVisible(${cat.id})" title="${cat.visible?'숨기기':'보이기'}"
        class="w-6 h-6 flex items-center justify-center flex-shrink-0 rounded-md hover:bg-primary-fixed/30 transition-colors">
        <span class="material-symbols-outlined text-[15px] ${cat.visible?'text-on-surface-variant':'text-on-surface-variant/25'}"
              style="font-variation-settings:'FILL' ${cat.visible?1:0},'wght' 400,'GRAD' 0,'opsz' 24">
          ${cat.visible?'visibility':'visibility_off'}
        </span>
      </button>
      <!-- 색상 점 -->
      <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 ${cat.visible?'':'opacity-25'}"
            style="background:${cat.bg}"></span>
      <!-- 이름 -->
      <span class="text-xs text-on-surface-variant flex-1 truncate ${cat.visible?'':'opacity-35 line-through'}">${escapeHtml(cat.name)}</span>
      <!-- 편집 버튼 (hover 시) -->
      <button onclick="openCatModal(${cat.id})" title="편집"
        class="w-6 h-6 flex items-center justify-center rounded-md opacity-0 group-hover:opacity-100 transition-all hover:bg-primary-fixed/30">
        <span class="material-symbols-outlined text-[13px] text-on-surface-variant">edit</span>
      </button>
    </div>
  `).join('');
  document.getElementById('cat-list').innerHTML = html;

  // 일정 추가 모달의 카테고리 select도 갱신
  const sel = document.getElementById('modal-field-category');
  if (sel) {
    const cur = sel.value;
    sel.innerHTML = '<option value="">— 선택 안 함 —</option>' +
      categories.map(c => `<option value="${escapeHtml(c.name)}" ${c.name===cur?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
  }
}

function toggleCatVisible(id) {
  const cat = categories.find(c => c.id === id);
  if (!cat) return;
  cat.visible = !cat.visible;
  saveCategories();
  renderCatList();
  renderCurrentView(); // 뷰 즉시 갱신
}

// ── 카테고리 모달 ──────────────────────────────────────────────────
function openCatModal(id) {
  catEditId = id;
  const modal = document.getElementById('cat-modal');

  // 색상 스와치 렌더
  const swatchContainer = document.getElementById('color-swatches');
  swatchContainer.innerHTML = COLOR_PRESETS.map((p, i) =>
    `<button type="button" class="color-swatch" data-idx="${i}"
             style="background:${p.bg}" title="${p.label}"
             onclick="selectCatColor(${i})"></button>`
  ).join('');

  if (id === null) {
    // 신규
    document.getElementById('cat-modal-title').textContent = '카테고리 추가';
    document.getElementById('cat-delete-btn').classList.add('hidden');
    document.getElementById('cat-field-name').value = '';
    selectCatColor(0);
  } else {
    // 편집
    const cat = categories.find(c => c.id === id);
    if (!cat) return;
    document.getElementById('cat-modal-title').textContent = '카테고리 편집';
    document.getElementById('cat-delete-btn').classList.remove('hidden');
    document.getElementById('cat-field-name').value = cat.name;
    // 해당 색상 찾아 선택
    const idx = COLOR_PRESETS.findIndex(p => p.bg === cat.bg);
    selectCatColor(idx >= 0 ? idx : 0);
  }

  modal.classList.remove('hidden');
}

function selectCatColor(idx) {
  catColorIdx = idx;
  const preset = COLOR_PRESETS[idx];
  // 스와치 selected 표시
  document.querySelectorAll('.color-swatch').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  // 미리보기 갱신
  const preview = document.getElementById('cat-preview');
  const name    = document.getElementById('cat-field-name').value || '카테고리';
  preview.textContent = name;
  preview.style.background = preset.bg;
  preview.style.color      = preset.text;
}

// 이름 입력 시 미리보기 실시간 갱신
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cat-field-name').addEventListener('input', () => {
    const name = document.getElementById('cat-field-name').value || '카테고리';
    document.getElementById('cat-preview').textContent = name;
  });
});

function closeCatModal() {
  document.getElementById('cat-modal').classList.add('hidden');
}

function saveCatModal() {
  const name = document.getElementById('cat-field-name').value.trim();
  if (!name) { alert('카테고리 이름을 입력해주세요.'); return; }

  const preset = COLOR_PRESETS[catColorIdx];

  if (catEditId === null) {
    // 신규 추가
    const newId = Math.max(0, ...categories.map(c => c.id)) + 1;
    categories.push({id: newId, name, bg: preset.bg, text: preset.text, visible: true});
  } else {
    // 기존 수정
    const cat = categories.find(c => c.id === catEditId);
    if (cat) { cat.name = name; cat.bg = preset.bg; cat.text = preset.text; }
  }

  saveCategories();
  renderCatList();
  renderCurrentView();
  closeCatModal();
}

function deleteCatFromModal() {
  if (!confirm(`'${categories.find(c=>c.id===catEditId)?.name}' 카테고리를 삭제할까요?\n일정의 카테고리 정보는 유지됩니다.`)) return;
  categories = categories.filter(c => c.id !== catEditId);
  saveCategories();
  renderCatList();
  renderCurrentView();
  closeCatModal();
}

// ── 카테고리 색상 조회 ─────────────────────────────────────────────
function getCatColors(catName) {
  if (!catName) return {bg:'#e6e8ed', text:'#2e3338'};
  const cat = categories.find(c => c.name === catName);
  return cat ? {bg: cat.bg, text: cat.text} : {bg:'#e6e8ed', text:'#2e3338'};
}

// 표시 여부 (토글 꺼진 카테고리는 숨김)
function isCatVisible(catName) {
  if (!catName) return true;
  const cat = categories.find(c => c.name === catName);
  return cat ? cat.visible : true;
}

// ── 이미지 내보내기 ────────────────────────────────────────────────
async function exportCalendar() {
  const btn = document.getElementById('export-btn');
  const origHtml = btn.innerHTML;
  btn.innerHTML = '<span class="material-symbols-outlined text-[16px] spin">progress_activity</span><span>처리 중...</span>';
  btn.disabled = true;

  try {
    const label   = document.getElementById('nav-label').textContent;
    const F       = '"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo",Arial,sans-serif';
    const isWeek  = activeTab === 'week';

    // Tailwind DOM을 복사하지 않고 처음부터 인라인 스타일로만 구성
    const wrapper = document.createElement('div');
    wrapper.style.cssText =
      `position:absolute;left:-9999px;top:0;background:#f9f9fc;padding:32px;font-family:${F};`;

    // 제목
    wrapper.innerHTML =
      `<div style="margin-bottom:12px;">` +
        `<span style="font-size:22px;font-weight:800;color:#655882;font-family:${F};letter-spacing:-0.5px;">Calendar</span>` +
        `<span style="font-size:14px;font-weight:700;color:#2e3338;font-family:${F};margin-left:12px;">${label}</span>` +
        `<span style="font-size:11px;color:#aeb2b8;font-family:${F};margin-left:12px;">` +
          `${new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}` +
        `</span>` +
      `</div>` +
      // 카테고리 범례
      `<div style="margin-bottom:16px;">` +
        categories.filter(c=>c.visible).map(c=>
          `<span style="display:inline-block;margin-right:14px;font-size:12px;font-weight:600;color:#5b5f65;font-family:${F};">` +
            `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c.bg};margin-right:4px;vertical-align:middle;"></span>` +
            `${c.name}` +
          `</span>`
        ).join('') +
      `</div>` +
      (isWeek ? buildWeekExportHtml(F) : buildMonthExportHtml(F));

    document.body.appendChild(wrapper);

    const canvas = await html2canvas(wrapper, {
      scale:           2,
      useCORS:         false,
      allowTaint:      true,
      backgroundColor: '#f9f9fc',
      logging:         false,
    });
    document.body.removeChild(wrapper);

    const link    = document.createElement('a');
    link.download = `calendar-${label||''}-${fmtDate(new Date())}.png`;
    link.href     = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('이미지 내보내기에 실패했습니다. 잠시 후 다시 시도해주세요.');
    console.error(e);
  } finally {
    btn.innerHTML = origHtml;
    btn.disabled  = false;
  }
}

// 월별 캘린더 — table 레이아웃 + 인라인 스타일만 사용 (html2canvas 호환)
function buildMonthExportHtml(F) {
  const firstDay  = new Date(calYear, calMonth, 1);
  const totalDays = new Date(calYear, calMonth+1, 0).getDate();
  const startDow  = firstDay.getDay(); // 0=일
  const W = 120, H = 100;

  let html = `<table style="border-collapse:collapse;table-layout:fixed;width:${W*7}px;font-family:${F};">`;

  // 요일 헤더
  html += '<tr>';
  ['일','월','화','수','목','금','토'].forEach((d, i) => {
    const c = i===0?'#a8364b':i===6?'#655882':'#5b5f65';
    html += `<th style="width:${W}px;padding:8px 4px;text-align:center;font-size:12px;font-weight:700;` +
            `color:${c};background:#f2f3f7;border-bottom:2px solid #dfe3e9;font-family:${F};">${d}</th>`;
  });
  html += '</tr><tr>';

  let col = 0;
  // 시작 요일 이전 빈 칸
  for (let i = 0; i < startDow; i++, col++) {
    html += `<td style="width:${W}px;height:${H}px;vertical-align:top;background:#fafafa;border:1px solid #eceef3;"></td>`;
  }

  for (let d = 1; d <= totalDays; d++, col++) {
    if (col > 0 && col % 7 === 0) html += '</tr><tr>';
    const ds      = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === TODAY_STR;
    const dow     = (startDow + d - 1) % 7;
    const dayT    = filterVisible(tasksForDate(ds));
    const bg      = isToday ? 'rgba(218,202,251,0.3)' : '#ffffff';
    const border  = isToday ? '2px solid rgba(101,88,130,0.4)' : '1px solid #eceef3';
    const dc      = dow===0?'#a8364b':dow===6?'#655882':'#2e3338';

    html += `<td style="width:${W}px;height:${H}px;vertical-align:top;background:${bg};border:${border};` +
            `padding:5px 4px;font-family:${F};">`;

    // 날짜 숫자 (오른쪽 상단)
    if (isToday) {
      html += `<div style="text-align:right;margin-bottom:3px;">` +
              `<span style="display:inline-block;width:20px;height:20px;border-radius:50%;` +
              `background:#655882;color:#ffffff;font-size:11px;font-weight:700;` +
              `text-align:center;line-height:20px;font-family:${F};">${d}</span></div>`;
    } else {
      html += `<div style="text-align:right;margin-bottom:3px;font-size:11px;font-weight:700;` +
              `color:${dc};font-family:${F};">${d}</div>`;
    }

    // 일정 pill
    dayT.slice(0, 3).forEach(t => {
      const {bg: cb, text: ct} = getCatColors(t.category);
      const done = t.status === 'done';
      html += `<div style="font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;` +
              `margin-bottom:2px;background:${cb};color:${ct};white-space:nowrap;overflow:hidden;` +
              `text-overflow:ellipsis;opacity:${done?0.5:1};font-family:${F};">${t.title}</div>`;
    });
    if (dayT.length > 3) {
      html += `<div style="font-size:9px;color:#aeb2b8;font-family:${F};">+${dayT.length-3}건</div>`;
    }

    html += '</td>';
  }

  // 마지막 행 빈 칸 채우기
  const rem = col % 7;
  if (rem > 0) {
    for (let i = rem; i < 7; i++) {
      html += `<td style="width:${W}px;height:${H}px;vertical-align:top;background:#fafafa;border:1px solid #eceef3;"></td>`;
    }
  }

  html += '</tr></table>';
  return html;
}

// 주간 캘린더 — table 레이아웃 + 인라인 스타일만 사용 (html2canvas 호환)
function buildWeekExportHtml(F) {
  const days = Array.from({length:7}, (_,i) => addDays(weekStart, i));
  const DN   = ['월','화','수','목','금','토','일'];
  const W    = 130;

  let html = `<table style="border-collapse:collapse;table-layout:fixed;width:${W*7}px;font-family:${F};"><tr>`;

  days.forEach((d, i) => {
    const ds      = fmtDate(d);
    const isToday = ds === TODAY_STR;
    const isSun   = i === 6, isSat = i === 5;
    const tasks   = filterVisible(tasksForDate(ds));

    const hBg    = isToday ? '#655882' : '#eceef3';
    const hColor = isToday ? '#fdf7ff' : isSun ? '#a8364b' : isSat ? '#655882' : '#5b5f65';

    html += `<td style="width:${W}px;vertical-align:top;border:1px solid #dfe3e9;font-family:${F};">`;
    // 요일/날짜 헤더
    html += `<div style="text-align:center;background:${hBg};padding:8px 4px;">` +
            `<div style="font-size:10px;font-weight:700;color:${hColor};letter-spacing:1px;font-family:${F};">${DN[i]}</div>` +
            `<div style="font-size:18px;font-weight:700;color:${hColor};font-family:${F};">${d.getDate()}</div>` +
            `</div>`;
    // 일정 목록
    html += `<div style="padding:6px;min-height:120px;">`;
    if (!tasks.length) {
      html += `<div style="font-size:11px;color:#d0d4da;text-align:center;padding:12px 0;font-family:${F};">없음</div>`;
    } else {
      tasks.forEach(t => {
        const {bg: cb} = getCatColors(t.category);
        const done = t.status === 'done';
        html += `<div style="padding:3px 0;font-family:${F};">` +
                `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cb};vertical-align:middle;margin-right:4px;"></span>` +
                (t.due_time ? `<span style="font-size:10px;color:#655882;font-weight:600;font-family:${F};">${t.due_time.slice(0,5)} </span>` : '') +
                `<span style="font-size:11px;color:#2e3338;font-family:${F};${done?'text-decoration:line-through;opacity:0.5;':''}">` +
                `${t.title}</span></div>`;
      });
    }
    html += `</div></td>`;
  });

  html += '</tr></table>';
  return html;
}

// ── 전역 상태 ─────────────────────────────────────────────────────
let allTasks    = [];
const now       = new Date();
const TODAY_STR = fmtDate(now);
let activeTab   = 'today';
let weekStart   = getMonday(now);
let calYear     = now.getFullYear();
let calMonth    = now.getMonth();
let selectedDay = null;
let modalTaskId = null;
let modalStatus = 'todo';

// ── 초기화 ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  categories = loadCategories();

  document.getElementById('sidebar-date').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  document.getElementById('btn-prev').onclick = () => {
    if (activeTab==='week') prevWeek(); else prevMonth();
  };
  document.getElementById('btn-next').onclick = () => {
    if (activeTab==='week') nextWeek(); else nextMonth();
  };

  renderCatList();
  await refreshAll();
  loadGreeting();
});

async function refreshAll() {
  try {
    const res  = await fetch('/tasks');
    const data = await res.json();
    allTasks   = data.tasks || [];
    // 탭에 관계없이 모든 뷰를 갱신 — 채팅 탭에 있어도 캘린더가 최신 상태를 유지
    renderToday();
    renderWeek();
    renderMonth();
  } catch(e) {}
}

function renderCurrentView() {
  if (activeTab==='today')      renderToday();
  else if (activeTab==='week')  renderWeek();
  else if (activeTab==='month') renderMonth();
}

// ── 탭 전환 ───────────────────────────────────────────────────────
const TAB_TITLES = {today:'오늘', week:'주간', month:'월별', chat:'AI 채팅'};

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('nav button').forEach(b => {
    b.classList.remove('nav-active'); b.classList.add('text-on-surface/60');
  });
  document.getElementById('tab-'+tab).classList.add('nav-active');
  document.getElementById('tab-'+tab).classList.remove('text-on-surface/60');
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
  document.getElementById('view-'+tab).classList.remove('hidden');
  document.getElementById('header-title').textContent = TAB_TITLES[tab];

  const nc  = document.getElementById('nav-controls');
  const exp = document.getElementById('export-btn');
  if (tab==='week'||tab==='month') {
    nc.classList.remove('hidden');  nc.classList.add('flex');
    exp.classList.remove('hidden'); exp.classList.add('flex');
  } else {
    nc.classList.add('hidden');  nc.classList.remove('flex');
    exp.classList.add('hidden'); exp.classList.remove('flex');
  }
  // 현재 데이터로 즉시 렌더 후, 서버에서 최신 데이터 가져와 재렌더
  renderCurrentView();
  if (tab !== 'chat') refreshAll();
}

// ── 날짜 도우미 ───────────────────────────────────────────────────
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function getMonday(d){
  const r=new Date(d),day=r.getDay();
  r.setDate(r.getDate()-(day===0?6:day-1));r.setHours(0,0,0,0);return r;
}
function tasksForDate(ds){return allTasks.filter(t=>t.due_date===ds);}
function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// 보이는 태스크만 (카테고리 토글 반영)
function filterVisible(tasks){
  return tasks.filter(t => isCatVisible(t.category));
}

// 상태 메타
const STATUS_META = {
  todo:        {label:'할 일',   bg:'#eceef3', text:'#5b5f65'},
  in_progress: {label:'진행 중', bg:'#bceddd', text:'#18473b'},
  done:        {label:'완료',    bg:'#dacafb', text:'#3a2e55'},
};

// 날짜+시간 기준으로 현재 시각이 이미 지난 일정인지 판단
// due_time 있으면 "YYYY-MM-DDTHH:MM" 비교, 없으면 당일 자정(다음날 00:00) 이후를 마감으로 간주
function isActuallyOverdue(task) {
  if (!task.due_date || task.status === 'done') return false;
  const now = new Date();
  if (task.due_time) {
    return new Date(task.due_date + 'T' + task.due_time) < now;
  } else {
    // 시간 미지정: 당일이 완전히 지나야 마감 초과 (오늘 날짜는 아직 진행 중)
    return task.due_date < TODAY_STR;
  }
}

// ── 카드 ────────────────────────────────────────────────────────────
function taskCard(task) {
  const isOverdue = isActuallyOverdue(task);
  const isDone    = task.status === 'done';
  const {bg,text} = getCatColors(task.category);
  const sm        = STATUS_META[task.status] || STATUS_META.todo;

  const catBadge = task.category
    ? `<span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:${bg};color:${text}">${escapeHtml(task.category)}</span>` : '';
  const statusBadge =
    `<span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:${sm.bg};color:${sm.text}">${sm.label}</span>`;
  const overdueBadge = isOverdue
    ? `<span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-error/10 text-error">마감 지남</span>` : '';
  const timeStr = task.due_time
    ? `<span class="font-semibold" style="color:#655882">${task.due_time.slice(0,5)}</span> · ` : '';
  const locStr = task.location
    ? `<p class="text-xs text-on-surface-variant mt-1 flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">location_on</span>${escapeHtml(task.location)}</p>` : '';

  return `<div class="bg-surface-container-lowest rounded-xl p-3.5 border border-outline-variant/10
               hover:shadow-md hover:scale-[1.01] transition-all cursor-pointer group ${isDone?'opacity-60':''}"
               onclick="openTask(${task.id})">
    <div class="flex items-start justify-between gap-2">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5 flex-wrap mb-1.5">${catBadge}${statusBadge}${overdueBadge}</div>
        <p class="text-sm font-medium text-on-surface leading-snug ${isDone?'line-through text-on-surface-variant':''}">
          ${timeStr}${escapeHtml(task.title)}
        </p>${locStr}
      </div>
      <span class="material-symbols-outlined text-on-surface-variant/20 group-hover:text-primary/40 transition-colors text-[16px] mt-0.5 flex-shrink-0">chevron_right</span>
    </div>
  </div>`;
}

// ── 오늘 뷰 ───────────────────────────────────────────────────────
function renderToday() {
  const base     = filterVisible(allTasks);
  // 실제로 마감이 지난 것만 경고 (날짜+시간 기준)
  const overdue  = base.filter(t => isActuallyOverdue(t));
  // 오늘 날짜 일정 중 아직 마감 안 지난 것 (overdue와 중복 방지)
  const todayT   = base.filter(t => t.due_date === TODAY_STR && !isActuallyOverdue(t))
                       .sort((a,b)=>(a.due_time||'99:99').localeCompare(b.due_time||'99:99'));
  const noDate   = base.filter(t => !t.due_date);
  const doneList = base.filter(t => t.status === 'done' && t.due_date && t.due_date < TODAY_STR);

  let html = `<div class="mb-6">
    <h2 class="hl text-3xl font-bold text-on-surface tracking-tight mb-1">오늘의 일정</h2>
    <p class="text-on-surface-variant text-sm">${now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</p>
  </div>`;

  if (overdue.length) html += `<div class="mb-5 bg-error/5 rounded-2xl p-4 border border-error/10">
    <h3 class="text-xs font-bold text-error mb-3 flex items-center gap-1 uppercase tracking-wide">
      <span class="material-symbols-outlined text-[14px]">warning</span> 지난 할 일 (${overdue.length})
    </h3><div class="space-y-2">${overdue.map(taskCard).join('')}</div></div>`;

  if (todayT.length) html += `<div class="mb-5">
    <h3 class="text-xs font-bold text-primary mb-3 flex items-center gap-1 uppercase tracking-wide">
      <span class="material-symbols-outlined text-[14px]">today</span> 오늘 (${todayT.length})
    </h3><div class="space-y-2">${todayT.map(taskCard).join('')}</div></div>`;

  if (noDate.length) html += `<div class="mb-5">
    <h3 class="text-xs font-bold text-on-surface-variant mb-3 flex items-center gap-1 uppercase tracking-wide">
      <span class="material-symbols-outlined text-[14px]">schedule</span> 날짜 미정 (${noDate.length})
    </h3><div class="space-y-2">${noDate.map(taskCard).join('')}</div></div>`;

  if (doneList.length) html += `<div class="mb-5">
    <h3 class="text-xs font-bold text-on-surface-variant/40 mb-3 flex items-center gap-1 uppercase tracking-wide">
      <span class="material-symbols-outlined text-[14px]">check_circle</span> 완료된 일 (${doneList.length})
    </h3><div class="space-y-2">${doneList.map(taskCard).join('')}</div></div>`;

  if (!overdue.length && !todayT.length && !noDate.length && !doneList.length) {
    html += `<div class="text-center py-16">
      <div class="w-16 h-16 bg-secondary-fixed/50 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-secondary text-[32px] fill-icon">check_circle</span>
      </div>
      <p class="hl font-bold text-on-surface text-lg">할 일이 없습니다!</p>
      <p class="text-on-surface-variant text-sm mt-1">오늘도 수고하셨어요 :)</p>
      <button onclick="openNewTask()" class="mt-4 text-sm text-primary font-bold hover:underline flex items-center gap-1 mx-auto">
        일정 추가하기 <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
      </button></div>`;
  }

  document.getElementById('today-content').innerHTML = html;
}

// ── 오늘로 이동 ───────────────────────────────────────────────────
function goToToday() {
  if (activeTab === 'week') {
    weekStart = getMonday(new Date());
    renderWeek();
  } else if (activeTab === 'month') {
    calYear  = now.getFullYear();
    calMonth = now.getMonth();
    selectedDay = TODAY_STR;
    document.getElementById('day-detail').classList.add('hidden');
    renderMonth();
    // 오늘 날짜 상세 자동 펼침
    setTimeout(() => selectCalDay(TODAY_STR), 50);
  }
}

// ── 주간 뷰 ───────────────────────────────────────────────────────
function prevWeek(){weekStart=addDays(weekStart,-7);renderWeek();}
function nextWeek(){weekStart=addDays(weekStart, 7);renderWeek();}

function renderWeek() {
  const days = Array.from({length:7},(_,i)=>addDays(weekStart,i));
  document.getElementById('nav-label').textContent =
    days[0].toLocaleDateString('ko-KR',{month:'long',day:'numeric'})+' – '+
    days[6].toLocaleDateString('ko-KR',{month:'long',day:'numeric'});

  // 현재 시각 기준으로 실제 마감이 지난 일정만 경고 (보고 있는 주 관계없이)
  const overdue = filterVisible(allTasks).filter(t => isActuallyOverdue(t));
  const od = document.getElementById('week-overdue');
  if (overdue.length) {
    od.classList.remove('hidden');
    document.getElementById('week-overdue-list').innerHTML = overdue.map(t=>
      `<div class="flex items-center gap-2 text-xs cursor-pointer hover:opacity-70" onclick="openTask(${t.id})">
        <span class="text-error">•</span>
        <span class="text-on-surface">${escapeHtml(t.title)}</span>
        <span class="text-error/60 ml-auto">${t.due_date}</span>
      </div>`).join('');
  } else { od.classList.add('hidden'); }

  const DN = ['월','화','수','목','금','토','일'];
  let html = '<div class="grid grid-cols-7 gap-2">';
  days.forEach((d,i) => {
    const ds      = fmtDate(d);
    const isToday = ds === TODAY_STR;
    const tasks   = filterVisible(tasksForDate(ds));
    const isSun   = i===6, isSat = i===5;
    const hStyle  = isToday?'background:#655882;color:#fdf7ff'
                  : isSun?'background:#eceef3;color:#a8364b'
                  : isSat?'background:#eceef3;color:#655882'
                  : 'background:#eceef3;color:#5b5f65';

    html += `<div class="bg-surface-container-lowest border ${isToday?'border-[#ccbcec]':'border-outline-variant/10'} rounded-xl overflow-hidden">
      <div class="text-center py-2" style="${hStyle}">
        <div class="text-[10px] font-bold uppercase tracking-wider">${DN[i]}</div>
        <div class="text-base font-bold">${d.getDate()}</div>
      </div>
      <div class="p-1.5 space-y-1 min-h-[90px]">`;

    if (!tasks.length) {
      html += `<p class="text-[11px] text-on-surface-variant/30 text-center pt-3">없음</p>`;
    } else {
      tasks.forEach(t => {
        const {bg} = getCatColors(t.category);
        const done = t.status==='done';
        html += `<div class="flex items-start gap-1.5 p-1 rounded-lg hover:bg-surface-container transition-colors cursor-pointer group ${done?'opacity-50':''}"
                     onclick="openTask(${t.id})">
          <span class="mt-1.5 w-2 h-2 rounded-full flex-shrink-0" style="background:${bg}"></span>
          <span class="text-[11px] text-on-surface group-hover:text-primary leading-tight ${done?'line-through text-on-surface-variant':''}">
            ${t.due_time?`<span class="text-primary font-semibold">${t.due_time.slice(0,5)}</span> `:''}${escapeHtml(t.title)}
          </span>
        </div>`;
      });
    }
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('week-content').innerHTML = html;
}

// ── 월별 뷰 ───────────────────────────────────────────────────────
function prevMonth(){
  calMonth--;if(calMonth<0){calMonth=11;calYear--;}
  selectedDay=null;document.getElementById('day-detail').classList.add('hidden');renderMonth();
}
function nextMonth(){
  calMonth++;if(calMonth>11){calMonth=0;calYear++;}
  selectedDay=null;document.getElementById('day-detail').classList.add('hidden');renderMonth();
}

function renderMonth() {
  const M=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('nav-label').textContent=`${calYear}년 ${M[calMonth]}`;

  const firstDay  = new Date(calYear,calMonth,1);
  const totalDays = new Date(calYear,calMonth+1,0).getDate();
  const startDow  = firstDay.getDay();

  let html = `<div class="grid grid-cols-7 mb-2 bg-surface-container-lowest rounded-2xl overflow-hidden border border-outline-variant/10">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    const c=i===0?'text-error':i===6?'text-primary':'text-on-surface-variant';
    html+=`<div class="text-center text-xs font-bold ${c} py-3">${d}</div>`;
  });
  html+='</div><div class="grid grid-cols-7 gap-1.5">';

  for(let i=0;i<startDow;i++) html+='<div class="min-h-[80px]"></div>';

  for(let d=1;d<=totalDays;d++){
    const ds      = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds===TODAY_STR;
    const isSel   = ds===selectedDay;
    const dow     = (startDow+d-1)%7;
    const dayT    = filterVisible(tasksForDate(ds));

    const bgStyle = isSel?'background:rgba(218,202,251,0.4)':isToday?'background:rgba(218,202,251,0.2)':'background:#ffffff';
    const brStyle = isSel?'border:2px solid rgba(101,88,130,0.5)':isToday?'border:1px solid rgba(101,88,130,0.3)':'border:1px solid rgba(174,178,184,0.15)';
    const dc      = dow===0?'#a8364b':dow===6?'#655882':'#2e3338';

    html+=`<div class="cal-day rounded-xl p-2 transition-all" style="${bgStyle};${brStyle}" onclick="selectCalDay('${ds}')">
      <div class="text-right mb-1">
        ${isToday
          ?`<span class="text-xs font-bold text-on-primary inline-flex items-center justify-center w-6 h-6 rounded-full" style="background:#655882">${d}</span>`
          :`<span class="text-xs font-bold" style="color:${dc}">${d}</span>`}
      </div>`;

    dayT.slice(0,2).forEach(t=>{
      const {bg,text}=getCatColors(t.category);
      const done=t.status==='done';
      html+=`<div class="text-[10px] font-bold rounded-full px-1.5 py-0.5 truncate mb-0.5 leading-tight ${done?'opacity-50':''}"
                  style="background:${bg};color:${text}" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</div>`;
    });
    if(dayT.length>2) html+=`<div class="text-[10px] text-on-surface-variant/60 font-medium">+${dayT.length-2}건</div>`;
    html+='</div>';
  }

  const total=startDow+totalDays,tail=(7-total%7)%7;
  for(let i=0;i<tail;i++) html+='<div class="min-h-[80px]"></div>';
  html+='</div>';
  document.getElementById('month-grid').innerHTML=html;
}

function selectCalDay(ds){
  selectedDay=ds; renderMonth();
  const tasks=filterVisible(tasksForDate(ds));
  const detail=document.getElementById('day-detail');
  const d=new Date(ds+'T12:00:00');
  document.getElementById('day-detail-title').textContent=
    d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'})+` — ${tasks.length}건`;
  if(!tasks.length){
    document.getElementById('day-detail-list').innerHTML=
      `<p class="text-sm text-on-surface-variant">할 일 없음</p>
       <button onclick="openNewTask()" class="mt-2 text-sm text-primary font-bold hover:underline flex items-center gap-1">
         일정 추가하기 <span class="material-symbols-outlined text-[14px]">arrow_forward</span></button>`;
  } else {
    document.getElementById('day-detail-list').innerHTML=tasks.map(taskCard).join('');
  }
  detail.classList.remove('hidden');
  detail.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── 일정 모달 ─────────────────────────────────────────────────────
function openNewTask(){
  modalTaskId=null; modalStatus='todo';
  document.getElementById('modal-title-label').textContent='새 일정 추가';
  document.getElementById('modal-delete-btn').classList.add('hidden');
  document.getElementById('modal-created-area').classList.add('hidden');
  document.getElementById('modal-field-title').value       = '';
  document.getElementById('modal-field-due_date').value    = TODAY_STR;
  document.getElementById('modal-field-due_time').value    = '';
  document.getElementById('modal-field-location').value    = '';
  document.getElementById('modal-field-attendees').value   = '';
  document.getElementById('modal-field-description').value = '';
  document.getElementById('modal-field-priority').value    = 'medium';
  refreshCatSelect('');
  renderModalStatus('todo');
  document.getElementById('task-modal').classList.remove('hidden');
}

async function openTask(id){
  try{
    const res=await fetch(`/tasks/${id}`);
    const data=await res.json();
    if(data.error){alert(data.error);return;}
    const t=data.task;
    modalTaskId=id; modalStatus=t.status||'todo';
    document.getElementById('modal-title-label').textContent='일정 상세';
    document.getElementById('modal-delete-btn').classList.remove('hidden');
    document.getElementById('modal-field-title').value       = t.title       ||'';
    document.getElementById('modal-field-due_date').value    = t.due_date    ||'';
    document.getElementById('modal-field-due_time').value    = t.due_time    ||'';
    document.getElementById('modal-field-location').value    = t.location    ||'';
    document.getElementById('modal-field-attendees').value   = t.attendees   ||'';
    document.getElementById('modal-field-description').value = t.description ||'';
    document.getElementById('modal-field-priority').value    = t.priority    ||'medium';
    if(t.created_at){
      const cr=new Date(t.created_at);
      document.getElementById('modal-created-area').classList.remove('hidden');
      document.getElementById('modal-created-at').textContent=
        cr.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})+' '+
        cr.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    } else {
      document.getElementById('modal-created-area').classList.add('hidden');
    }
    refreshCatSelect(t.category||'');
    renderModalStatus(t.status||'todo');
    document.getElementById('task-modal').classList.remove('hidden');
  }catch(e){alert('일정을 불러오지 못했습니다.');}
}

function refreshCatSelect(current){
  const sel = document.getElementById('modal-field-category');
  sel.innerHTML = '<option value="">— 선택 안 함 —</option>' +
    categories.map(c=>`<option value="${escapeHtml(c.name)}" ${c.name===current?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
}

function renderModalStatus(status){
  modalStatus=status;
  const conf={
    todo:        {border:'border-primary/60',  bg:'rgba(218,202,251,0.35)', text:'#655882'},
    in_progress: {border:'border-secondary/60',bg:'rgba(188,237,221,0.35)', text:'#3b675b'},
    done:        {border:'border-secondary/60',bg:'rgba(188,237,221,0.35)', text:'#3b675b'},
  };
  ['todo','in_progress','done'].forEach(s=>{
    const btn=document.getElementById('status-'+s);
    btn.classList.remove('border-primary/60','border-secondary/60','border-outline-variant/20');
    btn.style.background=''; btn.style.color='';
    if(s===status){
      btn.classList.add(conf[s].border);
      btn.style.background=conf[s].bg; btn.style.color=conf[s].text;
    } else {
      btn.classList.add('border-outline-variant/20');
    }
  });
}
function setModalStatus(s){renderModalStatus(s);}

function closeModal(){document.getElementById('task-modal').classList.add('hidden');}

async function saveModal(){
  const title=document.getElementById('modal-field-title').value.trim();
  if(!title){alert('제목을 입력해주세요.');return;}
  const body={
    title, status:modalStatus,
    due_date:    document.getElementById('modal-field-due_date').value    ||null,
    due_time:    document.getElementById('modal-field-due_time').value    ||null,
    category:    document.getElementById('modal-field-category').value    ||null,
    location:    document.getElementById('modal-field-location').value    ||null,
    attendees:   document.getElementById('modal-field-attendees').value   ||null,
    description: document.getElementById('modal-field-description').value ||null,
    priority:    document.getElementById('modal-field-priority').value,
  };
  try{
    const url    = modalTaskId ? `/tasks/${modalTaskId}` : '/tasks/new';
    const method = modalTaskId ? 'PATCH' : 'POST';
    const res    = await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data   = await res.json();
    if(data.error){alert(data.error);return;}
    closeModal();
    await refreshAll();
  }catch(e){alert('저장에 실패했습니다.');}
}

async function deleteFromModal(){
  if(!modalTaskId) return;
  if(!confirm('이 일정을 삭제할까요?')) return;
  try{
    await fetch(`/tasks/${modalTaskId}`,{method:'DELETE'});
    closeModal(); await refreshAll();
  }catch(e){alert('삭제에 실패했습니다.');}
}

// ── 채팅 ──────────────────────────────────────────────────────────
async function loadGreeting(){
  showTyping();
  try{
    const res=await fetch('/greeting');
    const data=await res.json();
    removeTyping();
    appendMessage('assistant',data.response||data.error);
  }catch{removeTyping();appendMessage('assistant','안녕하세요! 무엇을 도와드릴까요? 😊');}
}

async function sendMessage(){
  const input=document.getElementById('input');
  const msg=input.value.trim(); if(!msg)return;
  input.value='';
  if(activeTab!=='chat') switchTab('chat');
  appendMessage('user',msg);

  const btn=document.getElementById('send-btn'),icon=document.getElementById('send-icon');
  btn.disabled=true; icon.textContent='progress_activity'; icon.classList.add('spin');
  showTyping();

  try{
    // 전송 전 현재 일정 ID 목록 저장 (새로 추가된 일정 감지용)
    const prevIds = new Set(allTasks.map(t => t.id));

    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data=await res.json();
    removeTyping();
    appendMessage('assistant',data.response||data.error||'오류가 발생했습니다.');
    await refreshAll();

    // 새로 추가된 일정 중 날짜가 있는 것 찾기
    const newTasks = allTasks.filter(t => !prevIds.has(t.id) && t.due_date);
    if (newTasks.length > 0) {
      flashTabBadge();
      // 첫 번째 새 일정의 날짜로 주간 뷰 이동
      const targetDate = new Date(newTasks[0].due_date + 'T12:00:00');
      weekStart = getMonday(targetDate);
      // 채팅 응답을 1.5초 보여준 뒤 주간 달력으로 자동 전환
      setTimeout(() => switchTab('week'), 1500);
    } else if (allTasks.length !== prevIds.size) {
      // 날짜 없는 일정이 추가된 경우 탭 배지만 표시
      flashTabBadge();
    }
  }catch{removeTyping();appendMessage('assistant','네트워크 오류가 발생했습니다.');}
  finally{btn.disabled=false;icon.textContent='send';icon.classList.remove('spin');}
}

// 일정 변경 시 오늘/주간/월별 탭 버튼에 초록 점 표시
function flashTabBadge() {
  ['today','week','month'].forEach(tab => {
    const btn = document.getElementById('tab-' + tab);
    // 기존 뱃지 제거
    btn.querySelector('.update-badge')?.remove();
    const dot = document.createElement('span');
    dot.className = 'update-badge';
    dot.style.cssText =
      'position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;' +
      'background:#3b675b;animation:badge-pop .4s ease;';
    btn.style.position = 'relative';
    btn.appendChild(dot);
    // 3초 후 제거
    setTimeout(() => dot.remove(), 3000);
  });
}

function quickSend(text){
  if(activeTab!=='chat') switchTab('chat');
  document.getElementById('input').value=text;
  sendMessage();
}

function appendMessage(role,text){
  const container=document.getElementById('messages');
  const isUser=role==='user';
  const wrapper=document.createElement('div');
  wrapper.className=`flex ${isUser?'justify-end':'justify-start'}`;
  const bubble=document.createElement('div');
  bubble.className=isUser
    ?'bg-gradient-to-br from-primary to-primary-dim text-on-primary rounded-2xl rounded-tr-sm px-4 py-3 max-w-xs md:max-w-md text-sm shadow-lg shadow-primary/20'
    :'bg-surface-container-lowest text-on-surface rounded-2xl rounded-tl-sm px-4 py-3 max-w-xs md:max-w-md text-sm shadow-sm border border-outline-variant/10 prose';
  bubble.innerHTML=formatText(text);
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  container.scrollTop=container.scrollHeight;
}

function formatText(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n/g,'<br>');
}

function showTyping(){
  const container=document.getElementById('messages');
  const t=document.createElement('div');
  t.id='typing-indicator'; t.className='flex justify-start';
  t.innerHTML=`<div class="bg-surface-container-lowest rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm border border-outline-variant/10 flex gap-1 items-center">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  container.appendChild(t);
  container.scrollTop=container.scrollHeight;
}
function removeTyping(){document.getElementById('typing-indicator')?.remove();}

async function clearHistory(){
  if(!confirm('대화 기록을 초기화할까요?')) return;
  await fetch('/clear',{method:'POST'});
  document.getElementById('messages').innerHTML='';
  appendMessage('assistant','대화 기록을 초기화했습니다. 다시 시작해볼까요? 😊');
}
</script>
